<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Redirecting…</title>
    <script>
      // GitHub Pages SPA fallback: redirect any deep link back to the app entry
      // while preserving the path in the query string.
      (function () {
        var l = window.location;
        var repoBase = l.pathname.split('/')[1];
        var redirect = l.origin + '/' + repoBase + '/?p=' + encodeURIComponent(l.pathname + l.search + l.hash);
        l.replace(redirect);
      })();
    </script>
  </head>
  <body></body>
</html>
